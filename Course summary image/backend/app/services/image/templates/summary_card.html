<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, height=800">
    <title>Course Summary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'CustomFont';
            src: local('Microsoft YaHei'), local('PingFang SC'), local('Helvetica Neue'), sans-serif;
        }

        body {
            font-family: 'CustomFont', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            width: 1200px;
            height: 800px;
            overflow: hidden;
            position: relative;
        }

        /* 背景渐变 - 可配置 */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* 渐变主题样式 */
        .theme-sunset .background {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
        }

        .theme-nature .background {
            background: linear-gradient(180deg, #0d1b2a 0%, #1b263b 100%);
        }

        .theme-ocean .background {
            background: linear-gradient(180deg, #0a0a0a 0%, #1a1a2e 100%);
        }

        .theme-purple .background {
            background: linear-gradient(180deg, #1a0a2e 0%, #2d1b4e 100%);
        }

        .theme-forest .background {
            background: linear-gradient(180deg, #0f2027 0%, #203a43 100%);
        }

        .theme-aurora .background {
            background: linear-gradient(180deg, #0c0c1e 0%, #1a1a3e 100%);
        }

        .theme-light .background {
            background: #ffffff;
        }

        .theme-dark .background {
            background: #0f172a;
        }

        /* 顶部标题 */
        .header {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 2px;
        }

        /* 内容区域 */
        .content {
            position: absolute;
            top: 130px;
            left: 60px;
            right: 60px;
            bottom: 100px;
            z-index: 10;
            overflow: hidden;
        }

        /* 列表项 */
        .item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 25px;
            position: relative;
        }

        .item:last-child {
            margin-bottom: 0;
        }

        /* 编号 - 渐变效果 */
        .number {
            width: 160px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 140px;
            font-weight: 700;
            color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            position: relative;
            flex-shrink: 0;
        }

        /* 渐变编号样式 - 参考 ref1~ref6 */
        .number.gradient-1 {
            background-image: linear-gradient(180deg, #ff6b35 0%, #f7c59f 100%);
        }

        .number.gradient-2 {
            background-image: linear-gradient(180deg, #2ecc71 0%, #a8e6cf 100%);
        }

        .number.gradient-3 {
            background-image: linear-gradient(180deg, #3498db 0%, #85c1e9 100%);
        }

        .number.gradient-4 {
            background-image: linear-gradient(180deg, #9b59b6 0%, #d7bde2 100%);
        }

        .number.gradient-5 {
            background-image: linear-gradient(180deg, #27ae60 0%, #82e0aa 100%);
        }

        .number.gradient-6 {
            background-image: linear-gradient(180deg, #00d4ff 0%, #7b2cbf 50%, #43e97b 100%);
        }

        /* 纯色编号样式 */
        .number.solid-1 { color: #ef4444; }
        .number.solid-2 { color: #3b82f6; }
        .number.solid-3 { color: #22c55e; }
        .number.solid-4 { color: #f97316; }
        .number.solid-5 { color: #8b5cf6; }
        .number.solid-6 { color: #06b6d4; }

        .number.dark-1 { color: #f87171; }
        .number.dark-2 { color: #60a5fa; }
        .number.dark-3 { color: #4ade80; }
        .number.dark-4 { color: #fb923c; }
        .number.dark-5 { color: #a78bfa; }
        .number.dark-6 { color: #22d3ee; }

        /* 内容区域 */
        .item-content {
            flex: 1;
            padding-left: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            padding-bottom: 20px;
            margin-top: 10px;
        }

        .theme-light .item-content {
            border-bottom-color: rgba(0,0,0,0.1);
        }

        .item:last-child .item-content {
            border-bottom: none;
        }

        .item-title {
            font-size: 26px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .theme-light .item-title {
            color: #1a1a1a;
        }

        .item-points {
            list-style: none;
        }

        .item-points li {
            font-size: 18px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 8px;
            padding-left: 18px;
            position: relative;
            line-height: 1.5;
        }

        .theme-light .item-points li {
            color: #666666;
        }

        .item-points li::before {
            content: "·";
            position: absolute;
            left: 0;
            color: rgba(255,255,255,0.5);
        }

        .theme-light .item-points li::before {
            color: #999999;
        }

        /* 底部装饰 */
        .footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            z-index: 10;
        }

        .footer-gradient {
            height: 100%;
            width: 100%;
        }

        .footer-gradient.gradient-1 {
            background: linear-gradient(90deg, #ff6b35, #f7c59f);
        }

        .footer-gradient.gradient-2 {
            background: linear-gradient(90deg, #2ecc71, #a8e6cf);
        }

        .footer-gradient.gradient-3 {
            background: linear-gradient(90deg, #3498db, #85c1e9);
        }

        .footer-gradient.gradient-4 {
            background: linear-gradient(90deg, #9b59b6, #d7bde2);
        }

        .footer-gradient.gradient-5 {
            background: linear-gradient(90deg, #27ae60, #82e0aa);
        }

        .footer-gradient.gradient-6 {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf, #43e97b);
        }

        .footer-gradient.solid-light {
            background: linear-gradient(90deg, #ef4444, #3b82f6, #22c55e, #f97316, #8b5cf6, #06b6d4);
        }

        .footer-gradient.solid-dark {
            background: linear-gradient(90deg, #f87171, #60a5fa, #4ade80, #fb923c, #a78bfa, #22d3ee);
        }

        /* 来源 */
        .source {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: rgba(255,255,255,0.4);
            z-index: 10;
        }

        .theme-light .source {
            color: rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="theme-{{ theme }}">
    <div class="background"></div>

    {% if title %}
    <div class="header">
        <h1>{{ title }}</h1>
    </div>
    {% endif %}

    <div class="content">
        {% for item in items %}
        <div class="item">
            <div class="number {{ number_class }}-{{ loop.index }}">{{ loop.index }}</div>
            <div class="item-content">
                {% if item.title %}
                <div class="item-title">{{ item.title }}</div>
                {% endif %}
                <ul class="item-points">
                    {% for point in item.points[:5] %}
                    <li>{{ point }}</li>
                    {% endfor %}
                </ul>
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="footer">
        <div class="footer-gradient {{ footer_class }}"></div>
    </div>

    {% if source_url %}
    <div class="source">Source: {{ source_url }}</div>
    {% endif %}
</body>
</html>
